<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patients · M1</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* Tokens reused from The Client Book so M1 reads as the same product. */
  :root{
    --paper:#FAF8F4; --surface:#FFFFFF; --ink:#211E1B; --muted:#736B62; --faint:#A29A8F;
    --line:#E8E2D9; --line-soft:#F0EBE3; --pine:#1F5F54; --pine-700:#184B43; --pine-bg:#EAF1EF;
    --amber:#A9681E; --amber-bg:#FBF1E0; --danger:#B23B3B; --danger-bg:#FBEDED;
    --shadow:0 1px 2px rgba(33,30,27,.04), 0 8px 28px rgba(33,30,27,.06); --radius:14px;
    --mono: ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif;font-size:15px;line-height:1.5;overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;font-size:15px;color:var(--ink)}
  :focus-visible{outline:2px solid var(--pine);outline-offset:2px;border-radius:6px}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:10px;font-weight:500;font-size:14px}
  .btn-primary{background:var(--pine);color:#fff} .btn-primary:hover{background:var(--pine-700)}
  .btn-ghost{border:1px solid var(--line);background:var(--surface)} .btn-ghost:hover{border-color:var(--faint)}
  .btn-quiet{color:var(--muted);padding:7px 10px} .btn-quiet:hover{color:var(--ink);background:var(--line-soft)}
  .btn-danger{color:var(--danger)} .btn-danger:hover{background:var(--danger-bg)}
  .field{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:var(--surface)}
  select.field{-webkit-appearance:none;appearance:none}
  .field:focus{outline:none;border-color:var(--pine);box-shadow:0 0 0 3px var(--pine-bg)}

  header.bar{display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--line);background:var(--paper);min-height:60px;position:relative}
  .bar-title{font-family:"Fraunces",serif;font-weight:500;font-size:20px}
  .who{margin-left:auto;font-size:13px;color:var(--muted)}
  .role-pill{font-size:11px;font-weight:600;color:var(--pine-700);background:var(--pine-bg);padding:2px 9px;border-radius:20px;margin-left:6px;text-transform:capitalize}

  #main{height:calc(100% - 61px)}
  .layout{height:100%;display:grid;grid-template-columns:320px 1fr}
  .list-col{border-right:1px solid var(--line);overflow-y:auto;background:var(--surface)}
  .list-tools{padding:14px 16px 10px;position:sticky;top:0;background:var(--surface);z-index:1;border-bottom:1px solid var(--line-soft)}
  .search{position:relative;margin-bottom:10px}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--faint)}
  .search input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:10px;background:var(--surface)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{padding:6px 13px;font-size:13px;font-weight:500;color:var(--muted)}
  .seg button.on{background:var(--pine-bg);color:var(--pine-700)}
  .person{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;border-left:3px solid transparent}
  .person:hover{background:var(--line-soft)} .person.active{background:var(--pine-bg);border-left-color:var(--pine)}
  .avatar{width:34px;height:34px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;color:var(--pine-700);background:#E2EBE8;font-family:"Fraunces",serif}
  .person-meta{min-width:0;flex:1} .person-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .person-sub{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .next-dot{font-size:11px;color:var(--amber);font-weight:500;white-space:nowrap}

  .detail-col{overflow-y:auto;padding:28px 32px 60px}
  .detail-wrap{max-width:720px;margin:0 auto}
  .detail-top{display:flex;align-items:flex-start;gap:16px;margin-bottom:18px}
  .detail-name{font-family:"Fraunces",serif;font-size:26px;font-weight:500;margin:0}
  .detail-actions{margin-left:auto;display:flex;gap:6px}
  .eyebrow{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600;margin:0 0 10px}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:22px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px 22px}
  .kv label{display:block;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:3px}
  .kv div{font-size:14.5px}
  .archived-tag{font-size:11px;font-weight:600;color:var(--amber);background:var(--amber-bg);padding:2px 9px;border-radius:20px;margin-left:8px;vertical-align:3px}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:18px}
  .tab{padding:9px 4px;margin-right:18px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab.on{color:var(--pine-700);border-bottom-color:var(--pine)}
  .note{border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:10px;padding:12px 14px;margin-bottom:12px;background:#FFFDF9}
  .note-head{display:flex;align-items:baseline;gap:10px;font-size:12.5px;color:var(--muted)}
  .note-author{font-weight:600;color:var(--ink)} .note-actions{margin-left:auto;display:flex;gap:4px}
  .note-body{margin-top:6px;font-size:14.5px;white-space:pre-wrap}
  .appt{display:flex;align-items:baseline;gap:10px;padding:10px 0;border-bottom:1px solid var(--line-soft)}
  .appt .dot{width:9px;height:9px;border-radius:50%;flex:none;align-self:center}
  .appt-when{font-weight:600;font-size:14px} .appt-meta{font-size:13px;color:var(--muted)}
  .confirmed{font-size:11px;font-weight:600;color:var(--pine-700);background:var(--pine-bg);padding:1px 8px;border-radius:20px;margin-left:auto}

  .empty{text-align:center;color:var(--muted);padding:46px 20px}
  .scrim{position:fixed;inset:0;background:rgba(33,30,27,.34);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;padding:20px;z-index:40}
  .scrim.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);width:100%;max-width:480px;padding:24px;max-height:90vh;overflow-y:auto}
  .modal h3{font-family:"Fraunces",serif;font-weight:500;font-size:20px;margin:0 0 16px}
  .lbl{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 5px}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .err{color:var(--danger);font-size:13px;min-height:16px;margin-top:10px}
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;z-index:60;transition:.2s;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* Setup / login states */
  .center{height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:400px;text-align:center}
  .card h1{font-family:"Fraunces",serif;font-weight:500;font-size:26px;margin:0 0 6px}
  .card p{color:var(--muted);margin:0 0 20px;font-size:14px}
  .card .field{margin-bottom:10px}
  pre.note-config{text-align:left;background:var(--line-soft);border-radius:10px;padding:14px;font-size:12.5px;overflow:auto;font-family:var(--mono)}
</style>
</head>
<body>
<div id="root"><div class="center"><div class="card"><p>Loading…</p></div></div></div>
<div class="scrim" id="scrim"><div class="modal" id="modalBox"></div></div>
<div id="toast"></div>

<script src="./config.js"></script>
<script type="module">
// Use the real Supabase layer when keys are present; otherwise fall back
// to the in-memory mock so the UI is clickable with zero setup.
const useReal = !!(window.SUPABASE_URL && window.SUPABASE_ANON)
const db = await import(useReal ? './data-core.js' : './mock.js')

const $ = (id) => document.getElementById(id)
const esc = (s) => (s??'').toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))
const initials = (n)=>{const p=(n||'').trim().split(/\s+/);return ((p[0]?.[0]||'')+(p[1]?.[0]||'')).toUpperCase()||'•'}
const fmtDate = (s)=> s ? new Date(s).toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}) : '—'
const fmtDateTime = (s)=> s ? new Date(s).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : '—'
let toastT; const toast=(m)=>{const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200)}

const state = { me:null, list:[], search:'', archived:false, selected:null, patient:null, tab:'notes', notes:[], appts:[] }

// ---- boot ----
const me = await safe(() => db.getMyProfile())
if (me) { state.me = me; renderApp(); if (db.IS_MOCK) showDemoBanner(); loadList() }
else renderLogin()

function showDemoBanner(){
  const m = $('main'); if (!m) return
  const b = document.createElement('div')
  b.textContent = 'Demo mode — sample data, nothing is saved. Add Supabase keys to connect the real database.'
  b.style.cssText = 'background:var(--amber-bg);color:var(--amber);padding:8px 18px;font-size:13px;text-align:center;border-bottom:1px solid #EAD9BC'
  m.prepend(b)
}

function renderSetup(){
  $('root').innerHTML = `<div class="center"><div class="card">
    <h1>Connect Supabase</h1>
    <p>This M1 scaffold talks to the M0 database. Set your project keys, then reload.</p>
    <pre class="note-config">&lt;script&gt;
  window.SUPABASE_URL  = "https://YOUR-PROJECT.supabase.co";
  window.SUPABASE_ANON = "your-anon-public-key";
&lt;/script&gt;
&lt;!-- place above the module script --&gt;</pre>
  </div></div>`
}

function renderLogin(){
  $('root').innerHTML = `<div class="center"><div class="card">
    <h1>The Client Book</h1><p>Sign in to the clinic record.</p>
    <input class="field" id="u" placeholder="Username" autocomplete="username"/>
    <input class="field" id="p" type="password" placeholder="Password" autocomplete="current-password"/>
    <button class="btn btn-primary" id="go" style="width:100%;justify-content:center">Sign in</button>
    <div class="err" id="le"></div>
  </div></div>`
  $('go').onclick = async ()=>{
    try { await db.signIn($('u').value.trim(), $('p').value); location.reload() }
    catch(e){ $('le').textContent = e.message }
  }
  $('root').addEventListener('keydown', e=>{ if(e.key==='Enter') $('go').click() })
}

function renderApp(){
  $('root').innerHTML = `
    <header class="bar">
      <a class="bar-title" href="admin.html" style="text-decoration:none;color:var(--ink)">Clinic</a>
      <span class="bar-title" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:24px">Patients</span>
      <button class="btn btn-ghost" id="importPatients">Import</button>
      <button class="btn btn-primary" id="newPatient">+ New patient</button>
      <span class="who">${esc(state.me.full_name)}<span class="role-pill">${esc(state.me.role)}</span></span>
      <button class="btn btn-quiet" id="signout">Sign out</button>
    </header>
    <div id="main"><div class="layout">
      <aside class="list-col">
        <div class="list-tools">
          <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input id="search" type="search" placeholder="Search name, phone, email…"/></div>
          <div class="seg"><button id="segA" class="on">Active</button><button id="segArch">Archived</button></div>
        </div>
        <div id="list"></div>
      </aside>
      <section class="detail-col"><div class="detail-wrap" id="detail"></div></section>
    </div></div>`
  $('signout').onclick = async ()=>{ await db.signOut(); location.reload() }
  $('newPatient').onclick = ()=> patientModal(null)
  $('importPatients').onclick = ()=> importModal()
  $('search').oninput = (e)=>{ state.search=e.target.value; loadList() }
  $('segA').onclick = ()=>{ state.archived=false; $('segA').classList.add('on'); $('segArch').classList.remove('on'); loadList() }
  $('segArch').onclick = ()=>{ state.archived=true; $('segArch').classList.add('on'); $('segA').classList.remove('on'); loadList() }
  renderDetail()
}

async function loadList(){
  state.list = await safe(()=>db.listPatients({ search:state.search, archived:state.archived })) || []
  const el = $('list')
  if (!state.list.length){ el.innerHTML = `<div class="empty"><p>No ${state.archived?'archived':'active'} patients${state.search?' match that search':''}.</p></div>`; return }
  el.innerHTML = state.list.map(p=>{
    const sub = p.phone || p.email || '—'
    const next = p.next_appointment ? `<span class="next-dot">${fmtDate(p.next_appointment)}</span>` : ''
    return `<div class="person ${p.id===state.selected?'active':''}" data-id="${p.id}">
      <div class="avatar">${esc(initials(p.full_name))}</div>
      <div class="person-meta"><div class="person-name">${esc(p.full_name)}</div><div class="person-sub">${esc(sub)}</div></div>${next}</div>`
  }).join('')
  el.querySelectorAll('.person').forEach(p=>p.onclick=()=>selectPatient(p.dataset.id))
}

async function selectPatient(id){
  state.selected = id; state.tab='notes'
  await db.logPatientView(id).catch(()=>{})           // audit 'view'
  state.patient = await safe(()=>db.getPatient(id))
  ;[state.notes, state.appts] = await Promise.all([
    safe(()=>db.listNotes(id)) , safe(()=>db.listPatientAppointments(id))
  ])
  loadList(); renderDetail()
}

function renderDetail(){
  const el = $('detail'); if (!el) return
  const p = state.patient
  if (!p){ el.innerHTML = `<div class="empty" style="margin-top:40px"><p>Select a patient to see demographics, appointment history, and clinical notes.</p></div>`; return }
  const isAdmin = state.me.role === 'admin'
  el.innerHTML = `
    <div class="detail-top">
      <div class="avatar" style="width:52px;height:52px;font-size:19px">${esc(initials(p.full_name))}</div>
      <div style="flex:1"><h2 class="detail-name">${esc(p.full_name)}${p.is_archived?'<span class="archived-tag">Archived</span>':''}</h2></div>
      <div class="detail-actions">
        <button class="btn btn-ghost" id="editP">Edit</button>
        <button class="btn btn-ghost" id="arcP">${p.is_archived?'Restore':'Archive'}</button>
        ${isAdmin?'<button class="btn btn-quiet btn-danger" id="delP">Delete</button>':''}
      </div>
    </div>

    <p class="eyebrow">Demographics</p>
    <div class="panel"><div class="grid2">
      ${kv('Date of birth', p.date_of_birth ? new Date(p.date_of_birth).toLocaleDateString() : '—')}
      ${kv('Gender', p.gender || '—')}
      ${kv('Phone', p.phone || '—')}
      ${kv('Email', p.email || '—')}
      ${kv('Emergency contact', p.emergency_contact_name || '—')}
      ${kv('Emergency phone', p.emergency_contact_phone || '—')}
    </div></div>

    <div class="tabs">
      <button class="tab ${state.tab==='notes'?'on':''}" data-tab="notes">Clinical notes</button>
      <button class="tab ${state.tab==='appts'?'on':''}" data-tab="appts">Appointment history</button>
    </div>
    <div id="tabBody"></div>`

  $('editP').onclick = ()=> patientModal(p)
  $('arcP').onclick = async ()=>{ await safe(()=>db.setArchived(p.id, !p.is_archived)); toast(p.is_archived?'Restored':'Archived'); selectPatient(p.id); loadList() }
  $('delP') && ($('delP').onclick = ()=> confirmDelete(p))
  el.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ state.tab=t.dataset.tab; renderDetail() })
  renderTab()
}
const kv = (label, val)=> `<div class="kv"><label>${label}</label><div>${esc(val)}</div></div>`

function renderTab(){
  const body = $('tabBody'); if (!body) return
  if (state.tab==='appts'){
    body.innerHTML = state.appts.length ? state.appts.map(a=>`
      <div class="appt"><span class="dot" style="background:${esc(a.appointment_type?.color||'#A29A8F')}"></span>
        <div><div class="appt-when">${fmtDateTime(a.start_time)}</div>
          <div class="appt-meta">${esc(a.appointment_type?.name||'Appointment')} · ${esc(a.practitioner?.full_name||'—')}${a.reason?' · '+esc(a.reason):''}</div></div>
        ${a.is_confirmed?'<span class="confirmed">Confirmed</span>':''}</div>`).join('')
      : `<div class="empty"><p>No appointments yet. Scheduling lands in M2.</p></div>`
    return
  }
  // notes tab
  const me = state.me
  const add = `<div style="margin-bottom:16px"><textarea class="field" id="noteNew" placeholder="Add a clinical note…" style="min-height:64px;resize:vertical"></textarea>
    <div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="btn btn-primary" id="addNote">Add note</button></div></div>`
  const list = state.notes.length ? state.notes.map(n=>{
    const mine = n.author_id === me.id
    const canEdit = mine || me.role==='admin'
    const canDelete = me.role==='admin'
    return `<div class="note" data-id="${n.id}">
      <div class="note-head"><span class="note-author">${esc(n.author?.full_name||'Unknown')}</span>
        <span>${fmtDateTime(n.created_at)}</span>
        <span class="note-actions">
          ${canEdit?`<button class="btn btn-quiet" data-edit="${n.id}">Edit</button>`:''}
          ${canDelete?`<button class="btn btn-quiet btn-danger" data-del="${n.id}">Delete</button>`:''}
        </span></div>
      <div class="note-body">${esc(n.note_body)}</div></div>`
  }).join('') : `<div class="empty"><p>No clinical notes recorded yet.</p></div>`
  body.innerHTML = add + list

  $('addNote').onclick = async ()=>{
    const v = $('noteNew').value.trim(); if(!v) return
    const n = await safe(()=>db.addNote(state.patient.id, v)); if(!n) return
    state.notes.unshift(n); toast('Note added'); renderTab()
  }
  body.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>editNote(b.dataset.edit))
  body.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
    await safe(()=>db.deleteNote(b.dataset.del)); state.notes=state.notes.filter(x=>x.id!==b.dataset.del); toast('Note deleted'); renderTab()
  })
}

function editNote(id){
  const n = state.notes.find(x=>x.id===id); if(!n) return
  modal(`<h3>Edit note</h3><textarea class="field" id="eb" style="min-height:120px;resize:vertical">${esc(n.note_body)}</textarea>
    <div class="err" id="ee"></div>
    <div class="modal-actions"><button class="btn btn-ghost" id="ec">Cancel</button><button class="btn btn-primary" id="es">Save</button></div>`)
  $('ec').onclick = closeModal
  $('es').onclick = async ()=>{
    const v=$('eb').value.trim(); if(!v){$('ee').textContent='Note can’t be empty.';return}
    try{ const up=await db.updateNote(id,v); n.note_body=up.note_body; closeModal(); toast('Note saved'); renderTab() }
    catch(e){ $('ee').textContent=e.message }
  }
}

function patientModal(p){
  const editing = !!p
  modal(`<h3>${editing?'Edit patient':'New patient'}</h3>
    <label class="lbl">Full name</label><input class="field" id="f_name" value="${esc(p?.full_name||'')}"/>
    <div class="grid2">
      <div><label class="lbl">Date of birth</label><input class="field" id="f_dob" type="date" value="${esc(p?.date_of_birth||'')}"/></div>
      <div><label class="lbl">Gender</label><select class="field" id="f_gender"><option value="">Select…</option>${['Male','Female','Others'].map(g=>`<option ${p?.gender===g?'selected':''}>${g}</option>`).join('')}</select></div>
      <div><label class="lbl">Phone</label><input class="field" id="f_phone" value="${esc(p?.phone||'')}"/></div>
      <div><label class="lbl">Email</label><input class="field" id="f_email" value="${esc(p?.email||'')}"/></div>
      <div><label class="lbl">Emergency contact</label><input class="field" id="f_ecn" value="${esc(p?.emergency_contact_name||'')}"/></div>
      <div><label class="lbl">Emergency phone</label><input class="field" id="f_ecp" value="${esc(p?.emergency_contact_phone||'')}"/></div>
    </div>
    <div class="err" id="pe"></div>
    <div class="modal-actions"><button class="btn btn-ghost" id="pc">Cancel</button>
      <button class="btn btn-primary" id="ps">${editing?'Save changes':'Add patient'}</button></div>`)
  setTimeout(()=>$('f_name').focus(),50)
  $('pc').onclick = closeModal
  $('ps').onclick = async ()=>{
    const fields = {
      full_name:$('f_name').value.trim(), date_of_birth:$('f_dob').value, gender:$('f_gender').value.trim(),
      phone:$('f_phone').value.trim(), email:$('f_email').value.trim(),
      emergency_contact_name:$('f_ecn').value.trim(), emergency_contact_phone:$('f_ecp').value.trim()
    }
    if(!fields.full_name){ $('pe').textContent='Please enter a name.'; return }
    try {
      if (editing){ await db.updatePatient(p.id, fields); closeModal(); toast('Patient updated'); await selectPatient(p.id) }
      else { const np = await db.createPatient(fields); closeModal(); toast('Patient added'); await loadList(); await selectPatient(np.id) }
    } catch(e){ $('pe').textContent = e.message }
  }
}

function confirmDelete(p){
  modal(`<h3>Delete ${esc(p.full_name)}?</h3>
    <p style="color:var(--muted)">Permanent deletion is admin-only and is recorded in the audit log. Prefer Archive unless you’re sure.</p>
    <div class="err" id="de"></div>
    <div class="modal-actions"><button class="btn btn-ghost" id="dc">Keep</button>
      <button class="btn btn-primary" style="background:var(--danger)" id="dy">Delete permanently</button></div>`)
  $('dc').onclick = closeModal
  $('dy').onclick = async ()=>{
    try{ await db.deletePatient(p.id); closeModal(); state.selected=null; state.patient=null; toast('Patient deleted'); loadList(); renderDetail() }
    catch(e){ $('de').textContent = e.message }
  }
}

// ---- bulk import from CSV / Excel ----
// Recognised header names (case/space/underscore-insensitive) → patient field.
const IMPORT_ALIASES = {
  full_name:['full name','name','patient name','fullname'],
  date_of_birth:['date of birth','dob','birthdate','birth date'],
  gender:['gender','sex'],
  phone:['phone','mobile','contact','phone number','contact number','tel','telephone'],
  email:['email','e mail','email address'],
  emergency_contact_name:['emergency contact','emergency contact name','emergency name','next of kin'],
  emergency_contact_phone:['emergency phone','emergency contact phone','emergency number','next of kin phone']
}

// Minimal RFC-4180-ish CSV parser (handles quotes, commas and newlines in fields).
function parseCSV(text){
  const rows=[]; let row=[], field='', inQ=false; text=text.replace(/\r\n?/g,'\n')
  for(let i=0;i<text.length;i++){ const c=text[i]
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++ } else inQ=false } else field+=c; continue }
    if(c==='"') inQ=true
    else if(c===',') { row.push(field); field='' }
    else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field='' }
    else field+=c
  }
  if(field!==''||row.length){ row.push(field); rows.push(row) }
  return rows
}

// Reads a File into an array of string rows. Excel support is loaded on demand.
async function readImportFile(file){
  const name=file.name.toLowerCase()
  let rows
  if(name.endsWith('.csv')){
    rows=parseCSV(await file.text())
  } else {
    const XLSX=await import('https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs')
    const wb=XLSX.read(await file.arrayBuffer(),{type:'array',cellDates:true})
    const ws=wb.Sheets[wb.SheetNames[0]]
    rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''})
  }
  return rows.filter(r=>r.some(c=>String(c).trim()!==''))
}

function mapImportHeaders(headers){
  const norm=s=>String(s||'').trim().toLowerCase().replace(/[_\s\-]+/g,' ')
  return headers.map(h=>{ const n=norm(h)
    for(const [field,aliases] of Object.entries(IMPORT_ALIASES)) if(aliases.includes(n)) return field
    return null })
}

function importGender(v){ const s=String(v||'').trim().toLowerCase()
  if(s==='m'||s==='male') return 'Male'
  if(s==='f'||s==='female') return 'Female'
  return s ? 'Others' : '' }

// Coerce common date inputs to YYYY-MM-DD (assumes day-first for slashed dates).
function importDate(v){ const s=String(v||'').trim(); if(!s) return ''
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s
  const m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/)
  if(m){ let day=+m[1], mon=+m[2], y=m[3]; if(y.length===2) y='20'+y
    if(mon>12&&day<=12){ const t=day; day=mon; mon=t }
    return `${y}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}` }
  const dt=new Date(s); return isNaN(dt) ? '' : dt.toISOString().slice(0,10)
}

// Duplicate detection — a row matches an existing patient when the
// name+DOB key matches, or a normalised phone number matches.
const dupNameKey=(name,dob)=>{ const n=String(name||'').trim().toLowerCase().replace(/\s+/g,' '); return n ? n+'|'+String(dob||'').slice(0,10) : '' }
const dupPhoneKey=(ph)=>{ const d=String(ph||'').replace(/\D/g,''); return d.length>=6 ? d : '' }
async function loadExistingPatientKeys(){
  const [active,archived]=await Promise.all([
    safe(()=>db.listPatients({ search:'', archived:false })),
    safe(()=>db.listPatients({ search:'', archived:true }))
  ])
  const names=new Set(), phones=new Set()
  for(const p of [...(active||[]),...(archived||[])]){
    const nk=dupNameKey(p.full_name,p.date_of_birth); if(nk) names.add(nk)
    const pk=dupPhoneKey(p.phone); if(pk) phones.add(pk)
  }
  return { names, phones }
}

function rowToPatient(row,map){
  const get=field=>{ const i=map.indexOf(field); return i>=0 ? String(row[i]??'').trim() : '' }
  return { full_name:get('full_name'), date_of_birth:importDate(get('date_of_birth')),
    gender:importGender(get('gender')), phone:get('phone'), email:get('email'),
    emergency_contact_name:get('emergency_contact_name'), emergency_contact_phone:get('emergency_contact_phone') }
}

function importModal(){
  modal(`<h3>Import patients</h3>
    <p style="color:var(--muted);font-size:13.5px;line-height:1.55;margin:0 0 14px">
      Upload a <strong>.csv</strong> or Excel <strong>.xlsx</strong> file. The first row must be column headers.
      Recognised columns: <em>Full name</em> (required), Date of birth, Gender, Phone, Email, Emergency contact, Emergency phone.
      <a href="./templates/patient-import-template.csv" download>Download template</a>.</p>
    <input class="field" id="impFile" type="file" accept=".csv,.xlsx,.xls" style="padding:9px"/>
    <div class="err" id="impErr"></div>
    <div id="impResult" style="font-size:13.5px;color:var(--muted);margin-top:10px"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="impClose">Close</button>
      <button class="btn btn-primary" id="impRun" disabled>Import</button>
    </div>`)
  let parsed=[], dupCount=0
  const errEl=$('impErr'), resEl=$('impResult'), runBtn=$('impRun')
  $('impClose').onclick=closeModal
  $('impFile').onchange=async(e)=>{
    errEl.textContent=''; resEl.textContent=''; runBtn.disabled=true; parsed=[]; dupCount=0
    const file=e.target.files[0]; if(!file) return
    resEl.textContent='Reading file…'
    try{
      const rows=await readImportFile(file)
      if(rows.length<2){ resEl.textContent=''; errEl.textContent='The file has no data rows below the header.'; return }
      const map=mapImportHeaders(rows[0])
      if(!map.includes('full_name')){ resEl.textContent=''; errEl.textContent='Could not find a “Full name” column in the header row.'; return }
      const candidates=rows.slice(1).map(r=>rowToPatient(r,map)).filter(p=>p.full_name)
      if(!candidates.length){ resEl.textContent=''; errEl.textContent='No rows with a full name were found.'; return }
      // Skip rows that already exist in the database (or repeat within the file).
      resEl.textContent='Checking for duplicates…'
      const existing=await loadExistingPatientKeys()
      for(const p of candidates){
        const nk=dupNameKey(p.full_name,p.date_of_birth), pk=dupPhoneKey(p.phone)
        if((nk&&existing.names.has(nk))||(pk&&existing.phones.has(pk))){ dupCount++; continue }
        if(nk) existing.names.add(nk); if(pk) existing.phones.add(pk)
        parsed.push(p)
      }
      const dupNote=dupCount?` <span style="color:var(--muted)">(${dupCount} duplicate${dupCount>1?'s':''} will be skipped)</span>`:''
      if(!parsed.length){ resEl.innerHTML=`All ${candidates.length} row(s) already exist — nothing to import.`; return }
      resEl.innerHTML=`Ready to import <strong>${parsed.length}</strong> patient(s).${dupNote}`
      runBtn.disabled=false
    }catch(err){ resEl.textContent=''; errEl.textContent='Could not read the file: '+(err.message||err) }
  }
  runBtn.onclick=async()=>{
    runBtn.disabled=true; runBtn.textContent='Importing…'; errEl.textContent=''
    let ok=0; const fails=[]
    for(let i=0;i<parsed.length;i++){
      try{ await db.createPatient(parsed[i]); ok++ }
      catch(err){ fails.push(`${parsed[i].full_name}: ${err.message||err}`) }
    }
    await loadList()
    resEl.innerHTML=`Imported <strong>${ok}</strong> of ${parsed.length}.`+
      (dupCount?` ${dupCount} duplicate${dupCount>1?'s':''} skipped.`:'')+
      (fails.length?`<div style="margin-top:6px;color:var(--danger)">${fails.slice(0,5).map(esc).join('<br>')}${fails.length>5?`<br>…and ${fails.length-5} more`:''}</div>`:'')
    runBtn.textContent='Import'
    if(ok&&!fails.length){ toast(`Imported ${ok} patient(s)`); }
  }
}

// ---- modal + error plumbing ----
const scrim=$('scrim'), modalBox=$('modalBox')
function modal(html){ modalBox.innerHTML=html; scrim.classList.add('open') }
function closeModal(){ scrim.classList.remove('open'); modalBox.innerHTML='' }
scrim.onclick=(e)=>{ if(e.target===scrim) closeModal() }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal() })

async function safe(fn){ try{ return await fn() } catch(e){ toast(e.message||'Something went wrong'); return null } }
</script>
</body>
