<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Client Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{ --paper:#FAF8F4; --surface:#FFFFFF; --ink:#211E1B; --muted:#736B62; --faint:#A29A8F;
    --line:#E8E2D9; --line-soft:#F0EBE3; --pine:#1F5F54; --pine-700:#184B43; --pine-bg:#EAF1EF; --amber:#A9681E; --amber-bg:#FBF1E0;
    --shadow:0 1px 2px rgba(33,30,27,.04), 0 8px 28px rgba(33,30,27,.06); }
  *{box-sizing:border-box} html,body{margin:0;min-height:100%}
  body{background:radial-gradient(120% 90% at 50% -10%, #FFFDFA 0%, var(--paper) 60%);color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px}
  .wrap{width:100%;max-width:760px}
  .crest{width:54px;height:54px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:50%;background:var(--surface);box-shadow:var(--shadow)}
  .crest svg{width:24px;height:24px;color:var(--pine)}
  h1{font-family:"Fraunces",serif;font-weight:500;font-size:34px;letter-spacing:-.01em;text-align:center;margin:0 0 6px}
  .sub{text-align:center;color:var(--muted);margin:0 0 30px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  a.card{display:block;text-decoration:none;color:inherit;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px;transition:border-color .15s, transform .05s;box-shadow:var(--shadow)}
  a.card:hover{border-color:var(--pine)} a.card:active{transform:translateY(1px)}
  .card .ic{width:38px;height:38px;border-radius:10px;background:var(--pine-bg);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
  .card .ic svg{width:20px;height:20px;color:var(--pine)}
  .card h2{font-family:"Fraunces",serif;font-weight:500;font-size:18px;margin:0 0 4px}
  .card p{margin:0;font-size:13px;color:var(--muted);line-height:1.45}
  .mode{margin-top:24px;text-align:center;font-size:12.5px;color:var(--faint)}
  .demo{display:inline-block;background:var(--amber-bg);color:var(--amber);padding:3px 10px;border-radius:20px;font-weight:600}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="crest"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5l-8-3Z"/><path d="m9 12 2 2 4-4"/></svg></div>
  <h1>The Client Book</h1>
  <p class="sub">Clinic management — records, scheduling, and admin.</p>
  <div class="grid">
    <a class="card" href="admin.html">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg></div>
      <h2>Dashboard</h2><p>Today's schedule, quick stats, and admin tools.</p>
    </a>
    <a class="card" href="patients.html">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13A4 4 0 0 1 16 11"/></svg></div>
      <h2>Patients</h2><p>Find, create, and edit records; clinical notes.</p>
    </a>
    <a class="card" href="calendar.html">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
      <h2>Appointments</h2><p>Day, week, and month views; book and confirm.</p>
    </a>
  </div>
  <p class="mode" id="mode"></p>
</div>
<script src="./config.js"></script>
<script>
  const live = !!(window.SUPABASE_URL && window.SUPABASE_ANON)
  document.getElementById('mode').innerHTML = live
    ? 'Connected to Supabase.'
    : 'Running in <span class="demo">demo mode</span> — sample data, nothing saved. Add keys in <code>web/config.js</code> to go live.'
</script>
</body>
</html>
